- category: friction
  area: brains
  severity: medium
  summary: A subagent consulting an identity skipped protocol steps that had been
    minted into the identity's brain earlier in the same session — recall-based protocol
    adherence lags freshly-minted protocol notes, and the orchestrator had to close
    the loop manually
  detail: The ask-identity run answered correctly but skipped the true-text double-check
    and the cache-write step, both added to card-interaction-protocol earlier in the
    session; likely the agent's recall never surfaced the fresh note.
  generalized: Freshly-minted protocol notes are not reliably picked up by same-session
    identity consults that depend on recall; until a protocol note has settled into
    links and role docs, delegating prompts should inject the protocol reference explicitly.
  routing:
    action: brain-note
    ref: inject-protocol-refs-in-delegation
- category: recommendation
  area: brains
  severity: medium
  summary: Skills and prompts that delegate identity consults should pass the identity's
    operative protocol note by name instead of trusting recall to find it
  generalized: When delegating a consult to a brain-backed identity, name the operative
    protocol note in the delegation prompt (one line); recall is for knowledge discovery,
    not for guaranteeing procedure compliance.
  routing:
    action: brain-note
    ref: inject-protocol-refs-in-delegation
