    'artifact of my setup.' Verifying gate claims from a properly, freshly, independently
    synced environment (not just the author's own) is what actually distinguishes
    those two cases.
  routing:
    action: brain-note
    ref: dev/stash-reproduce-check-cannot-detect-shared-environment-staleness
