  generalized: Cache adjudicated answers as notes with an explicit confidence line,
    then ask the human a structured correct/not/unsure question after each answer;
    wire each response to a confidence transition, and treat human objections as suggestions
    requiring source-document confirmation, never direct edits.
  routing:
