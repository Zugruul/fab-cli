items:
- category: worked-well
  area: brains
  severity: medium
  summary: bulk knowledge corpus generated by a deterministic script writing note
    files directly (with a check/diff mode) instead of minting thousands of notes
  detail: 4,862 card notes generated from a vendored JSON corpus; idempotent rebuild,
    preserved hand-curated sections, links.json written by the generator. Validated
    by spot-checks and recall smoke tests.
  generalized: Bulk generated corpora belong in generator scripts that write brain-note
    files directly with an idempotent check/diff mode, reserving mint for hand-curated
    knowledge; recall matches exact tags, so generators must deliberately engineer
    the tag surface.
  routing:
    action: brain-note
    ref: bulk-corpora-generate-dont-mint
- category: worked-well
  area: brains
  severity: medium
  summary: a corpus shared by several role brains stored ONCE and relatively symlinked
    into each brain made cross-brain desync structurally impossible
  detail: Keyword notes physical in one brain, relative symlinks in the others; git
    tracks symlinks as mode-120000 objects so clones reproduce them; the brain engine
    reads through them transparently (verified via activation logs). A checker validates
    template + symlink integrity, and a manifest attributes unauthorized content changes.
  generalized: For knowledge shared verbatim across role brains, store one physical
    copy and relative-symlink it into the other brains — desync becomes impossible
    by construction; guard the write-through hazard (writing via a symlink edits the
    shared file) with role rules and a hash manifest.
  routing:
    action: brain-note
    ref: shared-corpus-symlink-pattern
- category: friction
  area: brains
  severity: low
  summary: the brain directory regenerator lists every note of every role unconditionally
    — a multi-thousand-note generated brain would bloat the shared directory file
    other identities grep
  detail: Left unregenerated this session; navigation is via tags and a hub note instead.
  generalized: Brain directory generation needs a collapse convention for large generated
    corpora (a count + pointer line instead of thousands of entries), or per-brain
    opt-out, so bulk brains don't drown the hand-curated ones.
  routing:
    action: brain-note
    ref: directory-bloat-generated-brains
- category: recommendation
  area: brains
  severity: low
  summary: strict note templates enforced by a checker (frontmatter shape, cross-field
    consistency) plus a committed hash manifest for drift attribution proved cheap
    and effective — worth adopting as a plugin-level pattern
  detail: A validator refused to propagate template-violating notes; the manifest
    distinguished 'canonical source updated' from 'a copy drifted', encoding the knowledge-flow
    hierarchy in tooling.
  generalized: 'Shared/canonical brain corpora benefit from a strict machine-validated
    note template and a committed hash manifest: the checker attributes drift (canon
    changed vs copy drifted) and refuses to propagate malformed knowledge.'
  routing:
    action: brain-note
    ref: template-checker-manifest-pattern
