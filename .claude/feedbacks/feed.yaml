    stated findings, don't assume a finding is correct just because it was stated
    confidently in a prior task's design doc or report -- the finding's own verification
    METHOD may be flawed even when its conclusion happens to be directionally right
    or wrong. Build re-verification into each task's own first step when a design
    doc's premise could have drifted or been wrong from the start, not just when new
    information has obviously changed.
