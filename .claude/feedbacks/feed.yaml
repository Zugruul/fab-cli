  detail: The design doc's caching strategy (wrap a per-tick fetch in a disk cache
    with ttlMs = the polling loop's own interval) seemed reasonable when written,
    but since the loop's own delay always fires at-or-after the interval, elapsed
    time between consecutive cache checks can never be strictly less than the TTL
    — the cache can never hit during normal operation. This wasn't caught during design
    or initial implementation; two independent review passes both found it when investigating
    an open question the orchestrator explicitly flagged for their attention.
  evidence:
  - fab-cli#16
  generalized: When designing a cache TTL for state accessed by a recurring timer/poll
    loop, if the TTL equals the loop's own interval, the cache is mathematically guaranteed
    to be a permanent miss (the loop's delay never fires strictly before the interval
    elapses, so elapsed time at each check is always >= TTL). This is worth checking
    explicitly at design time — sketch out two consecutive access timestamps under
    the loop's actual delay mechanism and verify the TTL comparison would ever evaluate
    true — rather than assuming a TTL 'roughly matching' the access cadence provides
    caching value.
